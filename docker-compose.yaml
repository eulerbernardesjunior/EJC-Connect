name: ejc-connect

services:
  db:
    image: postgres:16-alpine
    container_name: ejc-connect-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ejc_connect}
      POSTGRES_USER: ${POSTGRES_USER:-ejc_connect}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ejc_connect}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ejc_connect} -d ${POSTGRES_DB:-ejc_connect}"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ejc-connect-backend
    environment:
      PORT: 3000
      NODE_ENV: production
      DATABASE_URL: postgres://${POSTGRES_USER:-ejc_connect}:${POSTGRES_PASSWORD:-ejc_connect}@db:5432/${POSTGRES_DB:-ejc_connect}
      UPLOAD_DIR: /app/uploads
      CHROME_BIN: /usr/bin/chromium
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-12h}
      ADMIN_NAME: ${ADMIN_NAME:-Administrador EJC}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@ejc.local}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ejc-connect-web
    ports:
      - "${APP_PORT:-80}:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
    name: ejc-connect_postgres_data
  uploads_data:
    name: ejc-connect_uploads_data
